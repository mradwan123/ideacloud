{% extends 'base.html' %}
{% load static %}

{% block tab %} Project Ideas {% endblock %}

{% block title %} Project Ideas {% endblock %}

{% block content %}

<!-- display of the projects to be made -->

<!-- "<br>" after "}}" is only for aesthetic purposes:
they can be styled with CSS/Bootstrap -->

<!-- project ideas and create project form need to be divided:
 the form will be available as button-->


 <!-- project ideas displayed with
  * title
  * description
  * number of likes
  * number of comments
  * name of the owner
  Each element will have a link to the project description
  -->
<form method="post">
    {% csrf_token %}
    <label>Title *</label><br>
    {{ form.title }}<br>
    <label>Description</label>
    {{ form.description }}<br>
    <label>Tags</label>
    {{ form.tags }}
    <button type="submit">Create project</button>
    <button type="reset">Cancel</button>
    <p>* are required fields</p>
</form>

{% endblock %}
